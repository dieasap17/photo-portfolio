name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Wrangler auth
        run: |
          mkdir -p ~/.config/.wrangler/config
          echo "${{ secrets.WRANGLER_CONFIG_B64 }}" | base64 -d > ~/.config/.wrangler/config/default.toml

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=photo-portfolio --commit-dirty=true
